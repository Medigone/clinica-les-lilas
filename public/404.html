<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página no encontrada | Clínica Les Lilas</title>
    <meta
      name="description"
      content="La página solicitada no existe o ya no está disponible en Clínica Les Lilas."
    />
    <meta name="robots" content="noindex, follow" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ef;
        --card: #ffffff;
        --text: #234146;
        --muted: rgba(35, 65, 70, 0.72);
        --accent: #1f5f63;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(100%, 720px);
        background: var(--card);
        border: 1px solid rgba(31, 95, 99, 0.08);
        border-radius: 28px;
        padding: 40px 32px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(35, 65, 70, 0.08);
      }

      .code {
        font-size: clamp(64px, 10vw, 108px);
        line-height: 1;
        margin: 0 0 12px;
        color: rgba(31, 95, 99, 0.18);
        font-weight: 700;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 4vw, 40px);
      }

      p {
        margin: 0 auto 28px;
        max-width: 36rem;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      a {
        text-decoration: none;
        border-radius: 14px;
        padding: 14px 20px;
        font-weight: 600;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: #fff;
        color: var(--accent);
        border: 1px solid rgba(31, 95, 99, 0.18);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code">404</p>
      <h1>Página no encontrada</h1>
      <p>
        La URL solicitada no existe o ha sido movida. Puede volver al inicio o ir a la página
        de contacto de Clínica Les Lilas.
      </p>
      <div class="actions">
        <a class="primary" href="/">Volver al inicio</a>
        <a class="secondary" href="/contacto">Contactar</a>
      </div>
    </main>
  </body>
</html>
